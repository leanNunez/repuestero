repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Esta rev DEBE coincidir con el ruff pineado en pyproject.toml ([dev] → ruff==0.15.22).
  # Si divergen, el hook y la CI juzgan el mismo código con reglas distintas y uno de los dos
  # miente. Al subir uno, subir el otro.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
