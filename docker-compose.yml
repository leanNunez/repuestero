services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repuestos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Crea el rol app_user (NOSUPERUSER, sin BYPASSRLS) en el primer arranque.
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/10_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repuestos"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
