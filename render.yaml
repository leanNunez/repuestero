# Deploy del backend de Repuestero en Render (plan free).
# Los secretos NO viven acá: van en el dashboard de Render (sync: false).
services:
  - type: web
    name: repuestero-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production # NO "prod": is_prod ahora acepta ambos, pero el estándar es production
      - key: EMBEDDINGS_BACKEND
        value: remote # embeddings vía HF Inference API → el backend entra en los 512MB del free
      # --- Secretos (cargar en el dashboard) ---
      - key: HF_TOKEN # token de HF con permiso "Make calls to Inference Providers"
        sync: false
      - key: DATABASE_URL # app_user@supabase, conexión directa (5432)
        sync: false
      - key: DATABASE_READONLY_URL # app_readonly@supabase
        sync: false
      - key: MIGRATIONS_DATABASE_URL # owner@supabase (corre las migraciones)
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS # la URL de Vercel, sin barra final
        sync: false
